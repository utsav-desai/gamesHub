<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Name Place Animal Thing | MiniGames Hub</title>
    <script src="../js/theme.js"></script>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="stylesheet" href="../css/styles.css">
    <script type="module" src="../js/name-place-animal-thing.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true">2P</span><span>MiniGames Hub</span></a>
      <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
    </header>
    <main class="game-shell">
      <section class="panel" aria-labelledby="game-title">
        <p class="eyebrow">Live room</p>
        <h1 id="game-title">Name Place Animal Thing</h1>
        <p class="panel-copy">Write one word in every category for the round letter. Valid answers score 10 points.</p>
        <div class="form-stack">
          <label class="field">Your name <input id="playerName" type="text" maxlength="24" autocomplete="nickname" placeholder="Player"></label>
          <button id="createRoomBtn" class="btn primary" type="button">Create Room</button>
          <label class="field">Room code <input id="roomCodeInput" type="text" inputmode="latin" maxlength="6" placeholder="ABCDE" aria-label="Room code"></label>
          <button id="joinRoomBtn" class="btn" type="button">Join Room</button>
        </div>
        <div id="roomStrip" class="room-strip" aria-live="polite">
          <div><span class="small-note">Room code</span><div id="currentRoomCode" class="room-code"></div></div>
          <div class="room-actions"><button id="copyRoomBtn" class="btn" type="button">Copy</button><button id="shareBtn" class="btn" type="button">Share</button></div>
        </div>
        <div id="statusMessage" class="status-box" role="status" aria-live="polite"></div>
        <p id="wordScore" class="small-note">Score: you 0 / opponent 0</p>
        <div class="button-row" style="margin-top: 14px;"><button id="leaveRoomBtn" class="btn warning" type="button">Leave Room</button></div>
      </section>
      <section class="game-panel" aria-label="Name Place Animal Thing">
        <div class="match-topbar">
          <div id="playerOneBadge" class="player-badge"><strong>Player 1</strong><span>Words</span></div>
          <div id="playerTwoBadge" class="player-badge"><strong>Player 2</strong><span>Words</span></div>
        </div>
        <div class="word-round">
          <div>
            <p id="roundNumber" class="eyebrow">Round 0 of 5</p>
            <div id="roundLetter" class="round-letter">-</div>
          </div>
          <form id="wordForm" class="word-form">
            <label class="field">Name <input id="nameInput" type="text" maxlength="32" placeholder="Sameer" disabled></label>
            <label class="field">Place <input id="placeInput" type="text" maxlength="32" placeholder="Surat" disabled></label>
            <label class="field">Animal <input id="animalInput" type="text" maxlength="32" placeholder="Snake" disabled></label>
            <label class="field">Thing <input id="thingInput" type="text" maxlength="32" placeholder="Spoon" disabled></label>
            <button id="submitWordsBtn" class="btn primary" type="submit" disabled>Submit Answers</button>
          </form>
        </div>
        <div id="answerReveal" class="answer-reveal"><p class="small-note">Answers appear here after both players submit.</p></div>
        <div class="button-row" style="margin-top: 14px;">
          <button id="nextRoundBtn" class="btn primary next-round-btn" type="button" disabled>Next Round</button>
        </div>
        <div id="postGameActions" class="post-game"><button id="rematchBtn" class="btn primary" type="button">Rematch</button></div>
      </section>
    </main>
  </body>
</html>
