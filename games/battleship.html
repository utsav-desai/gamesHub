<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battleship | MiniGames Hub</title>
    <script src="../js/theme.js"></script>
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="stylesheet" href="../css/styles.css">
    <script type="module" src="../js/battleship.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html"><span class="brand-mark" aria-hidden="true">2P</span><span>MiniGames Hub</span></a>
      <button class="theme-toggle" type="button" data-theme-toggle>Dark</button>
    </header>
    <main class="game-shell">
      <section class="panel" aria-labelledby="game-title">
        <p class="eyebrow">Live room</p>
        <h1 id="game-title">Battleship</h1>
        <p class="panel-copy">Place your ships, lock your fleet, then take turns firing at the opponent ocean.</p>
        <div class="form-stack">
          <label class="field">Your name <input id="playerName" type="text" maxlength="24" autocomplete="nickname" placeholder="Player"></label>
          <button id="createRoomBtn" class="btn primary" type="button">Create Room</button>
          <label class="field">Room code <input id="roomCodeInput" type="text" inputmode="latin" maxlength="6" placeholder="ABCDE" aria-label="Room code"></label>
          <button id="joinRoomBtn" class="btn" type="button">Join Room</button>
        </div>
        <div id="roomStrip" class="room-strip" aria-live="polite">
          <div><span class="small-note">Room code</span><div id="currentRoomCode" class="room-code"></div></div>
          <div class="room-actions"><button id="copyRoomBtn" class="btn" type="button">Copy</button><button id="shareBtn" class="btn" type="button">Share</button></div>
        </div>
        <div id="statusMessage" class="status-box" role="status" aria-live="polite"></div>
        <p id="shipStatus" class="small-note">Place your fleet to begin.</p>
        <div class="placement-controls" aria-label="Ship placement controls">
          <label class="field">Ship <select id="shipPicker"></select></label>
          <div class="button-row">
            <button id="rotateShipBtn" class="btn" type="button">Rotate</button>
            <button id="randomFleetBtn" class="btn" type="button">Random</button>
            <button id="readyFleetBtn" class="btn primary" type="button">Ready</button>
          </div>
        </div>
        <div class="button-row" style="margin-top: 14px;"><button id="leaveRoomBtn" class="btn warning" type="button">Leave Room</button></div>
      </section>
      <section class="game-panel" aria-label="Battleship boards">
        <div class="match-topbar">
          <div id="playerOneBadge" class="player-badge"><strong>Player 1</strong><span>Fleet</span></div>
          <div id="playerTwoBadge" class="player-badge"><strong>Player 2</strong><span>Fleet</span></div>
        </div>
        <div class="ocean-layout">
          <div><h2 class="section-title">Your ocean</h2><div id="ownOcean" class="ocean-grid"></div></div>
          <div><h2 class="section-title">Target ocean</h2><div id="targetOcean" class="ocean-grid target"></div></div>
        </div>
        <div id="postGameActions" class="post-game"><button id="rematchBtn" class="btn primary" type="button">Rematch</button></div>
      </section>
    </main>
  </body>
</html>
